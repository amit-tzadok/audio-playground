apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: audio-platform
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: audio-backend:latest
          # imagePullPolicy: Never uses the locally built minikube image.
          # Remove this line when pushing to a real registry (IKS/OpenShift).
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: audio-platform-config
          volumeMounts:
            - name: audio-data
              mountPath: /app/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: audio-data
          persistentVolumeClaim:
            claimName: audio-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: audio-platform
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
