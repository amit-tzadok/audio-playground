apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audio-data-pvc
  namespace: audio-platform
spec:
  # ReadWriteOnce works for minikube (single-node cluster).
  # For multi-node IKS, change to ReadWriteMany and set:
  #   storageClassName: ibmc-file-gold
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
